<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do-List</title>
</head>
<body>
    <div class="container">

        <div class="container-input">
            <input type="text" id="input-text" placeholder="Add Your Text">
            <button onclick="addTask()">Add</button>
        </div>
        
        <div id="container-todolist">
            <ul id="to-do-block">
                <li class="task">
                    <span class="checkboxleft"><img src="images/check.svg" alt=""></span>
                    <span>Add your text here...</span>
                    <span class="checkboxright"><img src="images/delete.svg" alt=""></span>
                </li>
            </ul>
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
