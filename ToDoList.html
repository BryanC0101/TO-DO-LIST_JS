<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do-List</title>
</head>
<body>
    <div class="container">
        <div class="container-input">
            <input type="text" placeholder="Add Your Text">
            <button>Add</button>
        </div>
        
        <div id="container-todolist">


            <div class="to-do-block">
                <div class="checkboxleft"><img src="images/check.svg" alt=""></div>
                <p>Add your text here...</p>
                <div class="checkboxright"><img src="images/delete.svg" alt=""></div>
            </div>

        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
